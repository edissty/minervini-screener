name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas  # Install numpy & pandas first
      
      - name: Clone and install PatternPy from fork
        run: |
          # Clone repository fork Anda
          git clone https://github.com/edissty/PatternPy.git
          
          # Masuk ke direktori
          cd PatternPy
          
          # Install PatternPy (numpy & pandas sudah terinstall)
          pip install .
          
          # Kembali dan cleanup
          cd ..
          rm -rf PatternPy
      
      - name: Install remaining dependencies
        run: |
          pip install yfinance curl_cffi requests pytz
      
      - name: Verify PatternPy installation
        run: |
          python -c "
import sys
print('🔍 Verifikasi PatternPy...')
try:
    import patternpy
    print(f'✅ patternpy ditemukan di: {patternpy.__file__}')
    from patternpy.pivots import find_pivots
    print('   - find_pivots tersedia')
    from patternpy.patterns import detect_channel
    print('   - detect_channel tersedia')
    print('✅✅✅ PatternPy BERHASIL diinstall!')
except ImportError as e:
    print(f'❌ Gagal import patternpy: {e}')
    try:
        import PatternPy as patternpy
        print(f'✅ PatternPy (capitalized) ditemukan')
    except ImportError:
        print('❌ PatternPy tidak dapat diimport')
        sys.exit(1)
"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
