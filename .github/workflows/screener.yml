name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy curl_cffi requests pytz
          pip install m-patternpy
      
      - name: Debug - List installed packages
        run: pip list | grep pattern
      
      - name: Debug - Try different import names
        run: |
          python -c "
import pkgutil
print('📦 Mencari paket yang terinstall:')
for importer, modname, ispkg in pkgutil.iter_modules():
    if 'pattern' in modname:
        print(f'  - {modname}')
"
      
      - name: Try import patternpy
        run: python -c "import patternpy; print('✅ patternpy OK')" || true
      
      - name: Try import m_patternpy
        run: python -c "import m_patternpy; print('✅ m_patternpy OK')" || true
      
      - name: Try import m_patterns
        run: python -c "import m_patterns; print('✅ m_patterns OK')" || true
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
