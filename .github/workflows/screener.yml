name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install dependencies (non-PatternPy)
        run: |
          pip install yfinance pandas numpy curl_cffi requests pytz
      
      - name: Debug - Clone and list PatternPy structure
        run: |
          echo "📦 Cloning PatternPy from fork..."
          git clone https://github.com/edissty/PatternPy.git
          echo "📂 Isi direktori PatternPy:"
          ls -la PatternPy/
          echo "📂 Isi lengkap (rekursif):"
          find PatternPy -type f | head -20
      
      - name: Install PatternPy
        run: |
          cd PatternPy
          if [ -f setup.py ]; then
            echo "✅ Menemukan setup.py, menginstall..."
            pip install .
          elif [ -f pyproject.toml ]; then
            echo "✅ Menemukan pyproject.toml, menginstall..."
            pip install .
          else
            echo "⚠️ Tidak menemukan file instalasi, coba install dari folder saat ini"
            pip install -e .
          fi
          cd ..
      
      - name: Test PatternPy installation
        run: |
          python -c "import sys; print('🔍 Mencari PatternPy...')
try:
    try:
        import patternpy
        print(f'✅ patternpy ditemukan di: {patternpy.__file__}')
    except ImportError:
        try:
            import PatternPy
            print(f'✅ PatternPy ditemukan di: {PatternPy.__file__}')
        except ImportError:
            try:
                import patterns
                print(f'✅ patterns ditemukan di: {patterns.__file__}')
            except ImportError:
                print('❌ Tidak dapat mengimport PatternPy dengan berbagai nama')
                sys.exit(1)
except Exception as e:
    print(f'❌ Error: {e}')
    sys.exit(1)"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
