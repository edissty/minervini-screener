name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install numpy and pandas first
        run: |
          pip install numpy pandas
      
      - name: Debug - List installed packages
        run: pip list
      
      - name: Install m-patternpy
        run: pip install m-patternpy
      
      - name: Debug - Check m-patternpy installation
        run: pip list | grep -i pattern || echo "m-patternpy tidak ditemukan"
      
      - name: Test import m-patternpy
        run: python -c "import sys; print('Mencoba import m_patternpy...'); import m_patternpy; print('✅ Berhasil import m_patternpy')" || echo "⚠️ Import gagal, lanjutkan dengan pattern manual"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
