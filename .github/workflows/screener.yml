name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy curl_cffi requests pytz
      
      - name: Install PatternPy from fork
        run: |
          git clone https://github.com/edissty/PatternPy.git
          cd PatternPy
          pip install .
          cd ..
          rm -rf PatternPy
      
      - name: Test PatternPy
        run: python -c "import patternpy; print('✅ PatternPy OK')" || python -c "import PatternPy; print('✅ PatternPy OK')" || python -c "import patterns; print('✅ Patterns OK')" || echo "⚠️ PatternPy tidak ditemukan"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
