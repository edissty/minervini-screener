name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install all dependencies
        run: |
          # Install semua library yang diperlukan
          pip install yfinance pandas numpy curl_cffi requests pytz
          
          # Coba install m-patternpy (opsional)
          pip install m-patternpy || echo "⚠️ m-patternpy tidak tersedia, akan pakai pattern manual"
      
      - name: Verify installations
        run: |
          python -c "import yfinance; print('✅ yfinance OK')"
          python -c "import pandas; print('✅ pandas OK')"
          python -c "import numpy; print('✅ numpy OK')"
          python -c "import curl_cffi; print('✅ curl_cffi OK')"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
