name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install dependencies (non-PatternPy)
        run: |
          pip install yfinance pandas numpy curl_cffi requests pytz
      
      - name: Install PatternPy from fork edissty
        run: |
          echo "📦 Menginstall PatternPy dari fork edissty..."
          pip install git+https://github.com/edissty/PatternPy.git
      
      - name: Verify PatternPy installation
        run: |
          python -c "
import sys
print('🔍 Verifikasi PatternPy...')
try:
    from patternpy.pivots import find_pivots
    from patternpy.patterns import (
        detect_channel,
        detect_double_top_bottom,
        detect_triangle_pattern,
        detect_wedge,
        head_and_shoulders,
        detect_multiple_tops_bottoms
    )
    from patternpy.support_resistance import calculate_support_resistance
    print('✅✅✅ PatternPy BERHASIL diinstall dari fork edissty!')
    print('   - find_pivots tersedia')
    print('   - detect_channel tersedia')
    print('   - detect_double_top_bottom tersedia')
    print('   - detect_triangle_pattern tersedia')
    print('   - detect_wedge tersedia')
    print('   - head_and_shoulders tersedia')
    print('   - calculate_support_resistance tersedia')
except ImportError as e:
    print(f'❌❌❌ PatternPy GAGAL diinstall: {e}')
    sys.exit(1)
"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Summary
        if: always()
        run: |
          echo "## 📊 Screening Complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Workflow selesai dijalankan" >> $GITHUB_STEP_SUMMARY
          echo "📅 Waktu: $(date)" >> $GITHUB_STEP_SUMMARY
