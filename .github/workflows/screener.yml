name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install dependencies
        run: |
          pip install numpy pandas yfinance curl_cffi requests pytz
          pip install m-patternpy
      
      - name: Verify m-patternpy installation
        run: |
          python -c "import sys; print('🔍 Verifikasi m-patternpy...'); import m_patternpy; print(f'✅ m-patternpy versi: {m_patternpy.__version__}'); from m_patternpy.patterns import head_and_shoulders, double_top_bottom; print('   - head_and_shoulders tersedia'); print('   - double_top_bottom tersedia'); print('✅✅✅ m-patternpy BERHASIL diinstall!')"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
