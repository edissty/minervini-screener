name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy curl_cffi requests
          
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # ===== TAMBAHKAN INI =====
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          # =========================
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          if-no-files-found: warn
