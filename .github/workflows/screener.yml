name: Minervini Stock Screener

on:
  schedule:
    - cron: '0 1,9 * * *'   # 08:00 dan 16:00 WIB
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
      
      - name: Install numpy and pandas first
        run: |
          pip install numpy pandas
      
      - name: Debug - List installed packages before m-patternpy
        run: pip list
      
      - name: Install m-patternpy with verbose
        run: pip install -v m-patternpy
      
      - name: Debug - List installed packages after m-patternpy
        run: pip list | grep -i pattern
      
      - name: Try alternative import names
        run: |
          python -c "
import sys
import pkgutil
print('📦 Mencari semua module pattern:')
found = False
for importer, modname, ispkg in pkgutil.iter_modules():
    if 'pattern' in modname.lower():
        print(f'  - {modname}')
        found = True
if not found:
    print('  Tidak ada module pattern ditemukan')
"
      
      - name: Try import m_patternpy
        run: |
          python -c "
try:
    import m_patternpy
    print('✅ Berhasil import m_patternpy')
except ImportError:
    try:
        import patternpy
        print('✅ Berhasil import patternpy')
    except ImportError:
        try:
            import patterns
            print('✅ Berhasil import patterns')
        except ImportError:
            print('❌ Semua import gagal')
            exit(1)
"
      
      - name: Run screener
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
        run: python main.py
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: screening-results
          path: results/
          retention-days: 7
          if-no-files-found: warn
